name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-verification:
    name: Compile, Detekt, Test, Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compile
        run: ./gradlew compileKotlin compileTestKotlin --no-daemon

      - name: Static analysis
        run: ./gradlew detekt --no-daemon

      - name: Unit and smoke tests with coverage gate
        run: ./gradlew test jacocoTestCoverageVerification --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-test-and-analysis-reports
          path: |
            build/reports/tests/test
            build/reports/jacoco/test
            build/reports/detekt

  docker-integration:
    name: Docker and Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: fast-verification

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify Docker daemon
        run: |
          docker version
          docker info

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Start project containers
        run: |
          docker compose up -d
          docker compose ps

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Stop project containers
        if: always()
        run: docker compose down -v

      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            build/reports/tests/integrationTest
            build/test-results/integrationTest
