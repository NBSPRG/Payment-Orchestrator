spring:
  application:
    name: payment-orchestration
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: payments
    password: payments
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

payment:
  idempotency:
    ttl: 24h
    cleanup-interval-ms: 3600000
  api:
    max-request-body-bytes: 1048576
    supported-currencies: INR,USD,EUR,GBP
  outbox:
    fixed-delay-ms: 1000
  reconciliation:
    interval-ms: 300000
  processing:
    fixed-delay-ms: 1000
  webhook:
    retry-interval-ms: 30000
  websocket:
    allowed-origins: "*"

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      PROVIDER_A:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      PROVIDER_B:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      PROVIDER_A:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      PROVIDER_B:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  timelimiter:
    instances:
      PROVIDER_A:
        timeoutDuration: 5s
      PROVIDER_B:
        timeoutDuration: 8s
