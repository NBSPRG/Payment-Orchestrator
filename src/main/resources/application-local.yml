# Local development profile — human-readable logging, relaxed settings

spring:
  profiles:
    active: local

logging:
  level:
    com.yuno.payment: DEBUG
    org.springframework.kafka: WARN

payment:
  websocket:
    allowed-origins: "*"
  outbox:
    fixed-delay-ms: 1000
  reconciliation:
    interval-ms: 300000
  webhook:
    retry-interval-ms: 30000
